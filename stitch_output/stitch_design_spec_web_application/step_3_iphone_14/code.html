<script>
        // Simple script to handle visual selection state for demonstration
        document.querySelectorAll('.grid button').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active styling from all
                document.querySelectorAll('.grid button').forEach(btn => {
                    btn.classList.remove('bg-excellent-accent', 'border-2', 'border-excellent-accent', 'shadow-[0_4px_0_0_#58A700]', 'text-on-primary');
                    btn.classList.add('bg-surface-gray', 'border', 'border-border-gray');
                    btn.style.setProperty('--shadow-color', '#E5E5E5');
                    
                    const iconContainer = btn.querySelector('div');
                    iconContainer.classList.remove('bg-white/20', 'text-white');
                    iconContainer.classList.add('bg-surface-container-high', 'text-text-secondary');
                    
                    const icon = btn.querySelector('.material-symbols-outlined');
                    icon.style.fontVariationSettings = "'FILL' 0";
                    
                    const text = btn.querySelector('span:not(.material-symbols-outlined)');
                    text.classList.remove('text-white', 'font-bold');
                    text.classList.add('text-on-surface');
                });

                // Add active styling to clicked
                this.classList.remove('bg-surface-gray', 'border', 'border-border-gray');
                this.classList.add('bg-excellent-accent', 'border-2', 'border-excellent-accent', 'shadow-[0_4px_0_0_#58A700]', 'text-on-primary');
                this.style.setProperty('--shadow-color', '#58A700');
                
                const iconContainer = this.querySelector('div');
                iconContainer.classList.remove('bg-surface-container-high', 'text-text-secondary');
                iconContainer.classList.add('bg-white/20', 'text-white');
                
                const icon = this.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 1";
                
                const text = this.querySelector('span:not(.material-symbols-outlined)');
                text.classList.remove('text-on-surface');
                text.classList.add('text-white', 'font-bold');
            });
        });
    </script>
